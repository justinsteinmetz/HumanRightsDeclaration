<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Rights — Not Optional</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
    margin: 0;
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #f5f5f5;
}

.stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
}

.slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
}

.slide.active {
    opacity: 1;
    pointer-events: auto;
}

h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 800;
    margin: 0 0 1rem;
    letter-spacing: -0.02em;
}

.quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    margin: 0;
    line-height: 1.5;
}

.highlight {
    color: #ff3b3b;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    margin-top: 1rem;
}

.plateau {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: #888;
    margin: 0;
}

.final .quote {
    line-height: 2;
    color: #f5f5f5;
}

#flash {
    position: fixed;
    inset: 0;
    display: none;
    z-index: 1000;
    background: #000;
}

#flash img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.2s ease;
}

#flash img.visible {
    opacity: 1;
}
</style>
</head>

<body>

<div class="stage">

    <div class="slide active" id="s0">
        <h1>Human Rights</h1>
        <p class="quote">You benefit from systems that violate them.</p>
    </div>

    <div class="slide" id="s1">
        <p class="quote">"Not me."</p>
        <p class="highlight">Yes, you.</p>
    </div>

    <div class="slide" id="s2">
        <p class="highlight">You live inside it.</p>
    </div>

    <div class="slide" id="s3">
        <p class="plateau">Nothing changes.</p>
    </div>

    <div class="slide trigger" id="s4"></div>

    <div class="slide final" id="s5">
        <p class="quote">You watch.<br>You scroll.<br><br>You continue.</p>
    </div>

</div>

<div id="flash">
    <img src="images/crowd.jpg" alt="">
    <img src="images/megaphone.jpg" alt="">
    <img src="images/smoke.jpg" alt="">
    <img src="images/rupture.jpg" alt="">
    <img src="images/arrest.jpg" alt="">
    <img src="images/train.jpg" alt="">
</div>

<script>
const slides = document.querySelectorAll('.slide');
const flashEl = document.getElementById('flash');
const flashImgs = document.querySelectorAll('#flash img');

let index = 0;
let locked = false;

const imageSrcs = [
    'images/crowd.jpg',
    'images/megaphone.jpg',
    'images/smoke.jpg',
    'images/rupture.jpg',
    'images/arrest.jpg',
    'images/train.jpg'
];

imageSrcs.forEach((src, i) => { flashImgs[i].src = src; });

function isTrigger(i) {
    return slides[i] && slides[i].classList.contains('trigger');
}

function show(i) {
    slides.forEach(s => s.classList.remove('active'));
    if (slides[i]) slides[i].classList.add('active');
}

function next() {
    if (locked) return;

    const nextIndex = index + 1;
    if (nextIndex >= slides.length) return;

    if (isTrigger(nextIndex)) {
        index = nextIndex;
        locked = true;
        runFlash();
        return;
    }

    index = nextIndex;
    show(index);
}

function prev() {
    if (locked) return;

    let prevIndex = index - 1;
    if (prevIndex < 0) return;
    if (isTrigger(prevIndex)) prevIndex--;
    if (prevIndex < 0) return;

    index = prevIndex;
    show(index);
}

function runFlash() {
    flashEl.style.display = 'block';
    flashEl.style.opacity = '1';
    flashEl.style.transition = '';
    flashImgs.forEach(img => img.classList.remove('visible'));

    const durations = [1400, 900, 700, 600, 500, 2200];
    let i = 0;

    function step() {
        flashImgs.forEach(img => img.classList.remove('visible'));
        flashImgs[i].classList.add('visible');

        const isLast = i === flashImgs.length - 1;

        setTimeout(() => {
            if (isLast) {
                flashEl.style.transition = 'opacity 0.6s ease';
                flashEl.style.opacity = '0';

                setTimeout(() => {
                    flashEl.style.display = 'none';
                    flashEl.style.opacity = '1';
                    flashEl.style.transition = '';

                    setTimeout(() => {
                        index++;
                        show(index);
                        locked = false;
                    }, 420);

                }, 600);
            } else {
                i++;
                step();
            }
        }, durations[i]);
    }

    step();
}

document.addEventListener('click', next);

document.addEventListener('keydown', e => {
    if (e.code === 'ArrowRight' || e.code === 'Space') { e.preventDefault(); next(); }
    if (e.code === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', e => {
    const delta = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(delta) < 50) next();
    else if (delta > 50) prev();
    else if (delta < -50) next();
}, { passive: true });

show(0);
</script>

</body>
</html>
