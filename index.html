<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Rights — Not Optional</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #f5f5f5;
    overflow: hidden;
}

.slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.6s ease;
}

.slide.active {
    opacity: 1;
}

.quote {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
}

.highlight {
    color: #ff3b3b;
    font-weight: 600;
}

/* FLASH */
#flash {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

#flash img {
    max-width: 100%;
    max-height: 100%;
}
</style>
</head>

<body>

<div class="slide active">
    <h1>Human Rights</h1>
    <p class="quote">You benefit from systems that violate them.</p>
</div>

<div class="slide">
    <p class="quote">"Not me."</p>
    <p class="highlight">Yes, you.</p>
</div>

<div class="slide">
    <p class="highlight">You live inside it.</p>
</div>

<div class="slide trigger">
    <p>Millions protest.</p>
</div>

<div class="slide">
    <p class="quote">You watch. You scroll. You continue.</p>
</div>

<div id="flash">
    <img id="flashImg">
</div>

<script>
const slides = document.querySelectorAll('.slide');
let index = 0;
let locked = false;

const images = [
"images/crowd.jpg",
"images/megaphone.jpg",
"images/smoke.jpg",
"images/rupture.jpg",
"images/arrest.jpg",
"images/train.jpg"
];

function show(i) {
    slides.forEach(s => s.classList.remove('active'));
    slides[i].classList.add('active');
}

function next() {
    if (locked) return;

    index++;
    if (index >= slides.length) index = slides.length - 1;

    show(index);

    if (slides[index].classList.contains('trigger')) {
        flash();
    }
}

function prev() {
    if (locked) return;

    index--;
    if (index < 0) index = 0;

    show(index);
}

function flash() {
    const container = document.getElementById('flash');
    const img = document.getElementById('flashImg');

    let i = 0;
    locked = true;
    container.style.display = "flex";

    function run() {
        img.src = images[i];

        if (i === images.length - 1) {
            setTimeout(() => {
                container.style.display = "none";
                locked = false;
                next();
            }, 1500);
            return;
        }

        setTimeout(() => {
            i++;
            run();
        }, 800);
    }

    run();
}

// click
document.body.onclick = next;

// keyboard
document.addEventListener('keydown', e => {
    if (e.code === "ArrowRight" || e.code === "Space") next();
    if (e.code === "ArrowLeft") prev();
});

show(0);
</script>

</body>
</html>
