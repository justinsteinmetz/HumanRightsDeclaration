<script>
const slides = document.querySelectorAll('.slide');
let currentIndex = 0;
let locked = false;

const flashImages = [
"images/crowd.jpg",
"images/megaphone.jpg",
"images/smoke.jpg",
"images/rupture.jpg",
"images/arrest.jpg",
"images/train.jpg"
];

let imagesLoaded = false;

/* ✅ PRELOAD WITH GUARANTEE */
function preloadImages(callback) {
    let loaded = 0;

    flashImages.forEach(src => {
        const img = new Image();
        img.onload = img.onerror = () => {
            loaded++;
            if (loaded === flashImages.length) {
                imagesLoaded = true;
                callback();
            }
        };
        img.src = src;
    });
}

function showSlide(index) {
    slides.forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
    });
}

function runFlashSequence() {
    const flash = document.getElementById('flash');
    let i = 0;
    locked = true;

    const timings = [700, 700, 600, 350, 350];

    function nextImage() {

        // FINAL IMAGE
        if (i === flashImages.length - 1) {
            flash.style.backgroundImage = `url(${flashImages[i]})`;
            flash.style.opacity = 1;

            setTimeout(() => {
                flash.style.opacity = 0;
                locked = false;
                nextSlide();
            }, 1800);

            return;
        }

        flash.style.backgroundImage = `url(${flashImages[i]})`;
        flash.style.opacity = 1;

        setTimeout(() => {
            flash.style.opacity = 0;
            i++;
            setTimeout(nextImage, 150);
        }, timings[i]);
    }

    nextImage();
}

function nextSlide() {
    if (locked) return;

    if (currentIndex < slides.length - 1) {
        currentIndex++;
        showSlide(currentIndex);

        if (slides[currentIndex].classList.contains('trigger-flash')) {

            // 🔥 WAIT UNTIL IMAGES ARE READY
            if (!imagesLoaded) {
                preloadImages(() => runFlashSequence());
            } else {
                runFlashSequence();
            }
        }
    }
}

document.querySelectorAll('.choice').forEach(choice => {
    choice.addEventListener('click', () => {
        document.getElementById('choice-result').innerText =
            "You removed: " + choice.innerText;
        nextSlide();
    });
});

document.body.addEventListener('click', (e) => {
    if (!e.target.classList.contains('choice')) {
        nextSlide();
    }
});

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowRight') {
        e.preventDefault();
        nextSlide();
    }
});

setInterval(() => {
    if (currentIndex === slides.length - 2) {
        document.getElementById('fade').style.opacity = 1;
    }
}, 1000);

showSlide(0);
</script>
